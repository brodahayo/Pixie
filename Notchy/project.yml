name: Pixie
options:
  bundleIdPrefix: com.pixie
  deploymentTarget:
    macOS: "15.6"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: "0.4.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

targets:
  Pixie:
    type: application
    platform: macOS
    sources:
      - path: Notchy
        excludes:
          - Resources
          - Info.plist
      - path: Notchy/Resources/notchy-state.py
        buildPhase: resources
      - path: Notchy/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixie.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Notchy/Info.plist
        CODE_SIGN_ENTITLEMENTS: Notchy/Resources/Notchy.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.6"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: Sparkle
        product: Sparkle
